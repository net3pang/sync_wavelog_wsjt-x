name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: wavelog-gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          npm install --prefix frontend
          wails build

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: wavelog-gate/build/bin/WSJT-Wavelog-Gate.exe
          generate_release_notes: true

  build-macos-arm64:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: wavelog-gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build (arm64)
        run: |
          npm install --prefix frontend
          wails build -platform darwin/arm64
          ls -la build/bin/

      - name: Package
        run: |
          cd build/bin
          ls -la
          APP=""; [ -d "WSJT-Wavelog-Gate.app" ] && APP="WSJT-Wavelog-Gate.app"
          [ -z "$APP" ] && [ -d "wavelog-gate.app" ] && APP="wavelog-gate.app"
          [ -z "$APP" ] && [ -f "WSJT-Wavelog-Gate" ] && APP="WSJT-Wavelog-Gate"
          if [ -z "$APP" ]; then echo "No build output found!" && exit 1; fi
          echo "Packaging: $APP"
          if [ -d "$APP" ]; then ditto -c -k --keepParent "$APP" WSJT-Wavelog-Gate-arm64.zip; else zip WSJT-Wavelog-Gate-arm64.zip "$APP"; fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: wavelog-gate/build/bin/WSJT-Wavelog-Gate-arm64.zip
          generate_release_notes: true

  build-macos-amd64:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: wavelog-gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build (amd64)
        env:
          CC: clang -arch x86_64
          CXX: clang++ -arch x86_64
        run: |
          npm install --prefix frontend
          wails build -platform darwin/amd64
          ls -la build/bin/

      - name: Package
        run: |
          cd build/bin
          ls -la
          APP=""; [ -d "WSJT-Wavelog-Gate.app" ] && APP="WSJT-Wavelog-Gate.app"
          [ -z "$APP" ] && [ -d "wavelog-gate.app" ] && APP="wavelog-gate.app"
          [ -z "$APP" ] && [ -f "WSJT-Wavelog-Gate" ] && APP="WSJT-Wavelog-Gate"
          if [ -z "$APP" ]; then echo "No build output found!" && exit 1; fi
          echo "Packaging: $APP"
          if [ -d "$APP" ]; then ditto -c -k --keepParent "$APP" WSJT-Wavelog-Gate-amd64.zip; else zip WSJT-Wavelog-Gate-amd64.zip "$APP"; fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: wavelog-gate/build/bin/WSJT-Wavelog-Gate-amd64.zip
          generate_release_notes: true
